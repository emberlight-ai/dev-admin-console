# Nginx vhost for getdevteam.com (HTTPS + HTTP->HTTPS redirect)
#
# Safe for multi-app servers:
# - Only matches getdevteam.com + www.getdevteam.com
# - Proxies to a dedicated localhost port (3015)
# - Does not modify any default server blocks
#
# Use this AFTER you have issued certificates with certbot.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream getdevteam_upstream {
  server 127.0.0.1:3015;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;

  server_name getdevteam.com www.getdevteam.com;

  # For Let's Encrypt HTTP-01 challenges (webroot method).
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name getdevteam.com www.getdevteam.com;

  ssl_certificate     /etc/letsencrypt/live/getdevteam.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/getdevteam.com/privkey.pem;

  # Reasonable modern TLS defaults
  ssl_session_timeout 1d;
  ssl_session_cache shared:MozSSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;

  # HSTS (enable after you confirm HTTPS works)
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  client_max_body_size 20m;

  location / {
    proxy_pass http://getdevteam_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}


