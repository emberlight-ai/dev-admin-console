# Nginx vhost for getdevteam.com (HTTP-only, safe before certs exist)
#
# Safe for multi-app servers:
# - Only matches getdevteam.com + www.getdevteam.com
# - Proxies to a dedicated localhost port (3015)
# - Does not modify any default server blocks
#
# Install:
#   sudo cp /home/ubuntu/dev-admin-console/deploy/nginx/getdevteam.com.conf /etc/nginx/sites-available/getdevteam.com
#   sudo ln -s /etc/nginx/sites-available/getdevteam.com /etc/nginx/sites-enabled/getdevteam.com
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream getdevteam_upstream {
  server 127.0.0.1:3015;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;

  server_name getdevteam.com www.getdevteam.com;

  # For Let's Encrypt HTTP-01 challenges (webroot method).
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    proxy_pass http://getdevteam_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Websockets / upgrade (safe to include for Next)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}


