<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Finder-like default avatar (simple, two-tone, minimal face) -->
  <defs>
    <clipPath id="rounded">
      <circle cx="64" cy="64" r="56" />
    </clipPath>
  </defs>

  <!-- Icon background -->
  <g clip-path="url(#rounded)">
    <rect x="8" y="8" width="56" height="112" fill="#E5E7EB"/>
    <rect x="64" y="8" width="56" height="112" fill="#FFFFFF"/>
    <!-- subtle center divider -->
    <rect x="63" y="8" width="2" height="112" fill="#9CA3AF" opacity="0.35"/>
  </g>

  <!-- Minimal face -->
  <path d="M46 54v8" stroke="#0F172A" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round"/>
  <path d="M82 54v8" stroke="#0F172A" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round"/>
  <path
    d="M44 82c10 10 30 10 40 0"
    stroke="#0F172A"
    stroke-opacity="0.55"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Outline -->
  <circle cx="64" cy="64" r="56" stroke="#111827" stroke-opacity="0.10" stroke-width="2"/>
</svg>


